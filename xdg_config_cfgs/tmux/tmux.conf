# For version: tmux 3.5a
# ╭────────────────────────────────────────────────────────────╮
# │ 前缀键                                                     │
# ╰────────────────────────────────────────────────────────────╯
# unbind-key C-b                                    # 取消默认前缀键 Ctrl-b
# set-option -g prefix C-f                      # 将前缀键改为 Ctrl-f
# bind-key a send-prefix                        # 按 prefix + a 向内部程序发送一次 tmux 前缀键；嵌套 tmux 时很有用
# ╭────────────────────────────────────────────────────────────╮
# │ 基础输入 / 终端能力                                        │
# ╰────────────────────────────────────────────────────────────╯
setw -g xterm-keys on                         # 启用 xterm 风格组合键序列，让 Ctrl/Alt/Shift + 功能键/方向键更容易被程序识别
set -s escape-time 0                          # ESC 后不等待，降低 Vim/Neovim 中退出插入模式的延迟
set -g repeat-time 300                        # 前缀键后 300ms 内允许连续执行可重复绑定，例如连续调整 pane 大小
set -s focus-events on                        # 启用终端焦点事件，让 Vim/Neovim 等程序知道窗口获得/失去焦点
set -s extended-keys on                       # 启用扩展按键协议，更好支持 Ctrl/Shift/Alt 组合键
set -as terminal-features 'xterm*:extkeys'    # 告诉 tmux：匹配 xterm* 的外层终端支持扩展按键 extkeys
set -g allow-passthrough on                   # 允许 pane 中的程序发送 tmux 直通转义序列，常用于图片协议、特殊终端能力或高级渲染
# set -g default-shell /bin/zsh                 # 新建 window/pane 默认使用 zsh 作为 shell
set -gu default-command                       # 取消 default-command，让 tmux 默认启动 default-shell，而不是固定执行某条命令
# ╭────────────────────────────────────────────────────────────╮
# │ 会话行为                                                   │
# ╰────────────────────────────────────────────────────────────╯
set -sg exit-empty on                         # 当没有任何 tmux session 时，tmux server 自动退出
set -g detach-on-destroy off                  # 当前 session 被销毁时，不直接 detach 客户端，而是尽量切换到其他 session
# set -g mouse off                              # 禁用鼠标操作
# set -g mouse on
set -g set-clipboard on                       # 允许 tmux 与系统剪贴板交互，复制内容可同步到终端剪贴板
set -g history-limit 99999                    # 每个 pane 保留 10000 行历史滚动缓冲；只影响新建 pane/window
# ╭────────────────────────────────────────────────────────────╮
# │ 窗口 / pane 编号与命名                                     │
# ╰────────────────────────────────────────────────────────────╯
set -g base-index 1                           # window 编号从 1 开始，而不是默认的 0
setw -g pane-base-index 1                     # pane 编号从 1 开始，而不是默认的 0
# 关闭自动重排窗口编号，避免关闭某个窗口后 Alt+3 指向变化
set -g renumber-windows off
set -g set-titles on                          # 允许 tmux 设置外层终端窗口标题
setw -g automatic-rename off                   # 根据当前运行程序自动重命名 window，例如 zsh、vim、ssh 等
setw -g mode-keys vi                          # copy-mode 使用 vi 风格按键，例如 h/j/k/l、/ 搜索等
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-V send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind-key -T copy-mode-vi MouseDragEnd1Pane
setw -g aggressive-resize on                  # 多客户端连接同一 session 时，窗口尺寸更积极地跟随当前窗口所在客户端调整
# set -g main-pane-width 110                    # main-vertical 等布局中，主 pane 宽度设置为 110 列
# ╭────────────────────────────────────────────────────────────╮
# │ 显示时间                                                   │
# ╰────────────────────────────────────────────────────────────╯
set -g display-panes-time 2000                # 显示 pane 编号提示的持续时间为 2000ms
set -g display-time 4000                      # tmux 状态消息显示 4000ms
# ╭────────────────────────────────────────────────────────────╮
# │ 终端类型 / 真彩色 / 下划线能力                             │
# ╰────────────────────────────────────────────────────────────╯
set -g default-terminal "tmux-256color"       # tmux 内部 TERM 设置为 tmux-256color，便于程序识别 tmux 的 256 色能力
set-option -sa terminal-overrides ',xterm-256color:RGB'  # 为 xterm-256color 追加 RGB 能力，支持 true color 真彩色
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'       # 追加下划线样式能力，例如 undercurl 波浪下划线
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # 追加下划线颜色能力，让诊断下划线等可以带颜色
# ╭────────────────────────────────────────────────────────────╮
# │ 活动 / bell 提示                                           │
# ╰────────────────────────────────────────────────────────────╯
set -g visual-activity off                    # 关闭窗口有活动时的可视提示消息
setw -g monitor-activity off                  # 不监控非当前窗口的输出活动
setw -g monitor-bell off                      # 不监控窗口内程序发出的 bell 响铃事件

# bind-key W run-shell "~/.config/tmux/scripts/layouts/work.sh"
# bind-key C-w run-shell "~/.config/tmux/scripts/layouts/work.sh --reset"

# set -g default-client-command 'run-shell "~/.config/tmux/scripts/layouts/work.sh --no-attach" ; new-session -A -s work'
# default-client-command
# ├── run-shell work.sh --no-attach
# │   └── 创建 work + 13 个 window
# └── new-session -A -s work
#     └── 进入 work

unbind-key r
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded."

##### pane 同步输入配置 #####

# Prefix + e：切换当前 window 的所有 pane 同步输入
bind-key e set-window-option synchronize-panes \; display-message "同步输入: #{?pane_synchronized,开启,关闭}"

# 状态栏右侧显示同步输入状态
set -g status-right "#{?pane_synchronized,#[fg=red]SYNC #[default],} %H:%M:%S %Y-%m-%d"
# 状态栏右侧显示 Prefix / 同步输入 / 时间
# PFX:on  ：已经按下 prefix，tmux 正在等待下一个快捷键
# PFX:off ：当前没有按下 prefix，普通按键会直接进入 pane
# 说明：#{client_prefix} 是 tmux 的客户端状态变量，每个 attach 的客户端会独立显示自己的 prefix 状态
set -g status-right-length 120
set -g status-right "#{?client_prefix,#[fg=yellow]#[bold]PFX:on#[nobold]#[default],#[fg=colour240]PFX:off#[default]} #{?pane_synchronized,#[fg=red]#[bold]SYNC#[nobold]#[default] ,}%H:%M:%S %Y-%m-%d"


bind-key v split-window -h
bind-key h split-window -v
# 不需要 prefix，直接切换 pane
unbind-key M-h
unbind-key M-j
unbind-key M-k
unbind-key M-l
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# 不需要 prefix，直接调整 pane 大小
unbind-key M-H
unbind-key M-J
unbind-key M-K
unbind-key M-L
bind-key -n M-H resize-pane -L 5
bind-key -n M-J resize-pane -D 5
bind-key -n M-K resize-pane -U 5
bind-key -n M-L resize-pane -R 5

# ==============================
# Alt + 数字：快速切换到第 1~10 个窗口
# -n 表示不需要 prefix，直接按 Alt+数字
# ==============================
unbind-key M-1
unbind-key M-2
unbind-key M-3
unbind-key M-4
unbind-key M-5
unbind-key M-6
unbind-key M-7
unbind-key M-8
unbind-key M-9
unbind-key M-0
bind-key -n M-1 select-window -t :=1
bind-key -n M-2 select-window -t :=2
bind-key -n M-3 select-window -t :=3
bind-key -n M-4 select-window -t :=4
bind-key -n M-5 select-window -t :=5
bind-key -n M-6 select-window -t :=6
bind-key -n M-7 select-window -t :=7
bind-key -n M-8 select-window -t :=8
bind-key -n M-9 select-window -t :=9
bind-key -n M-0 select-window -t :=10

# ==============================
# Alt + Shift + 数字：切换到第 11~20 个窗口
# 注意：很多终端里 Shift+数字 实际发送的是符号
# US 键盘布局：
# Shift+1 = !
# Shift+2 = @
# Shift+3 = #
# Shift+4 = $
# Shift+5 = %
# Shift+6 = ^
# Shift+7 = &
# Shift+8 = *
# Shift+9 = (
# ==============================
unbind-key M-!
unbind-key M-@
unbind-key M-\#
unbind-key M-\$
unbind-key M-%
unbind-key M-^
unbind-key M-&
unbind-key M-*
unbind-key M-(
unbind-key M-)
bind-key -n M-!  select-window -t :=11
bind-key -n M-@  select-window -t :=12
bind-key -n M-\# select-window -t :=13
bind-key -n M-\$ select-window -t :=14
bind-key -n M-%  select-window -t :=15
bind-key -n M-^  select-window -t :=16
bind-key -n M-&  select-window -t :=17
bind-key -n M-*  select-window -t :=18
bind-key -n M-(  select-window -t :=19
bind-key -n M-)  select-window -t :=20



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor 'frappe' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
# set -g status-position bottom

set -g @plugin 'azorng/tmux-smooth-scroll'
# Speed: 0-1000 | lower = faster
set -g @smooth-scroll-speed "100"

# Easing mode: linear|sine|quad
set -g @smooth-scroll-easing "sine"

# Scroll line distance
set -g @smooth-scroll-normal "3"
set -g @smooth-scroll-halfpage ""  # Default: pane_height / 2
set -g @smooth-scroll-fullpage ""  # Default: pane_height

# Enable on mouse wheel scroll
set -g @smooth-scroll-mouse "true"

# Auto-exit copy mode when scrolling past the bottom
set -g @smooth-scroll-exit-copy-mode-at-bottom "true"


# restore tmux
# ===== 保存和恢复 tmux 工作环境 =====
set -g @plugin 'tmux-plugins/tmux-resurrect'
# 详细中文注释：让 tmux-resurrect 保存和恢复 pane 中的终端输出内容
set -g @resurrect-capture-pane-contents 'on'
# 详细中文注释：保存 pane 的完整历史内容，而不只是当前可见区域
set -g @resurrect-pane-contents-area 'full'
# 可选：恢复常用开发工具
# 详细中文注释：谨慎添加，不建议使用 :all:
set -g @resurrect-processes 'vim nvim htop man less ssh gdb'
# ===== 自动保存和自动恢复 =====
# Continuous saving, saved at an interval of 15 minutes
# Automatic tmux start
set -g @plugin 'tmux-plugins/tmux-continuum'
# 可选：修改自动保存间隔，单位是分钟
# 详细中文注释：默认是 15 分钟，可以按需调整
set -g @continuum-save-interval '10'

# 启动 tmux server 时自动恢复上一次保存的环境
# set -g @continuum-restore 'on'

if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

